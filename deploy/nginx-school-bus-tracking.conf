# Silverleaf Bus QR — Nginx + PHP-FPM
# URL: http://localhost/school-bus-tracking/  (matches config/database.php SITE_URL)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost 192.168.100.229 bus.silverleaf.local;

    root /var/www/html;
    index index.php index.html;
    client_max_body_size 32M;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    }

    location ~ /\.ht {
        deny all;
    }
}
